<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lore</title>
<link rel="icon" type="image/png" href="assets/Img/favicon.png">

  <!-- CSS global -->
  <link rel="stylesheet" href="css/styles.css?v=4" />
</head>
<body class="page-lore">

  <!-- Header (nav standardisée) -->
  <div id="site-header"></div>

  <!-- Lignes verticales -->
  <div class="page-grid" aria-hidden="true"></div>

  <!-- BLOC FIXE CENTRÉ (PNG) -->
  <div class="pharrel-fixed" aria-hidden="true" data-glitch>
    <img
      src="assets/Img/LORE/Hire Me.png"
      alt="i wanna be pharrel"
      class="pharrel-sticker"
      loading="eager"
      decoding="async"
    />
  </div>

  <!-- SCÈNE LORE (scrollable) -->
  <main id="lore" class="lore-scene" role="main" aria-label="Lore">
    <div id="lore-stage">

      <!-- Chaînes -->
      <img src="assets/Img/LORE/CHAINS 5 1.png" alt="" class="lore-item chains chains--5" loading="lazy">
      <img src="assets/Img/LORE/CHAINS 9 1.png" alt="" class="lore-item chains chains--9" loading="lazy">

      <!-- Blocs textes / panneaux -->
      <img src="assets/Img/LORE/DESC 2.png" alt="Description 2" class="lore-item panel panel--desc2" loading="lazy">
      <img src="assets/Img/LORE/DESC 3.png" alt="Description 3" class="lore-item panel panel--desc3" loading="lazy">
      <img src="assets/Img/LORE/DESC.png"   alt="Description"  class="lore-item panel panel--desc"  loading="lazy">

      <!-- Cartouches / tableaux -->
      <img src="assets/Img/LORE/FAV BRAND.png"      alt="My fav brand is Gentlemonster" class="lore-item tag tag--favbrand" loading="lazy">
      <img src="assets/Img/LORE/film.png"           alt="Top 3 films of all time"        class="lore-item table table--films" loading="lazy">
      <img src="assets/Img/LORE/IF NOT PHARREL.png" alt="if not pharrel, abloh is just fine" class="lore-item tag tag--ifnotpharrel" loading="lazy">
      <img src="assets/Img/LORE/NDA.png"            alt="I work both publicly and under NDA contracts" class="lore-item tag tag--nda" loading="lazy">
      <img src="assets/Img/LORE/PARIS.png"          alt="Currently living in Paris"      class="lore-item tag tag--paris" loading="lazy">
      <img src="assets/Img/LORE/TOP SONG.png"       alt="Top 3 songs of all time"        class="lore-item table table--songs" loading="lazy">

      <!-- Photos -->
      <img src="assets/Img/LORE/TIMMY.png"         alt="Timmy"        class="lore-item photo photo--timmy" loading="lazy">
      <img src="assets/Img/LORE/PHOTO JB.png"      alt="Photo JB"     class="lore-item photo photo--jb" loading="lazy">
      <img src="assets/Img/LORE/PHOTO COUPLE.png"  alt="Photo couple" class="lore-item photo photo--couple" loading="lazy">
      <img src="assets/Img/LORE/CAT.png"           alt="Cat speech bubble" class="lore-item photo photo--cat" loading="lazy">

      <!-- Oranges -->
      <img src="assets/Img/LORE/orange 1.png" alt="" class="lore-item deco deco--orange1" loading="lazy">
      <img src="assets/Img/LORE/orange 2.png" alt="" class="lore-item deco deco--orange2" loading="lazy">

      <!-- Symbole -->
      <img src="assets/Img/LOGO PASTILLE.svg" alt="" class="lore-logo PASTILLE" loading="lazy">

    </div>
  </main>

  <!-- FOOTER -->
  <div id="site-footer"></div>

  <!-- JS global -->
  <script src="js/script.js" defer></script>
  <script src="js/glitch.js" defer></script>
</body>
</html>
